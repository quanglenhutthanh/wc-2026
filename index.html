<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f4f6fa">
<title>World Cup 2026 — Trung tâm giải đấu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e14; --bg2:#11161f; --panel:#161c27; --panel2:#1d2533;
  --line:#283143; --line2:#374255;
  --txt:#eef2f8; --txt2:#9aa7bd; --txt3:#5f6c82;
  --gold:#f5c518; --gold2:#ffd84d; --red:#e23636; --green:#28b463; --blue:#3aa0ff;
  --live:#ff4757;
  --hero-grad1:rgba(245,197,24,.07); --hero-grad2:rgba(226,54,54,.06);
  --header-bg:rgba(10,14,20,.82); --modal-overlay:rgba(5,7,11,.78);
  --radius:14px; --radius-sm:9px;
  --shadow:0 10px 40px -12px rgba(0,0,0,.7);
}
[data-theme="light"]{
  --bg:#f4f6fa; --bg2:#ffffff; --panel:#ffffff; --panel2:#eef1f6;
  --line:#e2e7ef; --line2:#d2d9e4;
  --txt:#1a2230; --txt2:#5a6678; --txt3:#8a94a6;
  --gold:#a87800; --gold2:#8a6300; --red:#d42f2f; --green:#1f9d57; --blue:#2b7fd4;
  --live:#e23636;
  --hero-grad1:rgba(245,197,24,.14); --hero-grad2:rgba(226,54,54,.08);
  --header-bg:rgba(255,255,255,.85); --modal-overlay:rgba(30,40,60,.4);
  --shadow:0 10px 30px -14px rgba(20,30,50,.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[hidden]{display:none !important}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:'Archivo',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.5;
  background-image:radial-gradient(circle at 15% -5%, var(--hero-grad1), transparent 40%), radial-gradient(circle at 90% 10%, var(--hero-grad2), transparent 35%);
  min-height:100vh; padding-bottom:60px;
  transition:background-color .25s, color .25s;
}
::selection{background:var(--gold);color:#000}
h1,h2,h3{font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:-.02em}
.display{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.01em;text-transform:uppercase}
button{font-family:inherit;cursor:pointer}
a{color:inherit;text-decoration:none}

/* ============ HEADER ============ */
header{
  position:sticky;top:0;z-index:100;
  background:var(--header-bg);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.head-top{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
.logo{display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo-mark{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--red));
  display:grid;place-items:center;font-size:21px;
  box-shadow:0 4px 18px -4px rgba(245,197,24,.5);
}
.logo-txt b{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.02em;display:block;line-height:1;text-transform:uppercase}
.logo-txt span{font-size:10.5px;color:var(--txt2);letter-spacing:.16em;text-transform:uppercase;font-weight:600}
.head-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{
  background:var(--panel);border:1px solid var(--line2);color:var(--txt);
  padding:8px 13px;border-radius:9px;font-size:12.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap;
}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2);color:#000}
.theme-toggle{padding:8px 10px;font-size:15px;line-height:1;background:var(--panel);border:1px solid var(--line2)}
.theme-toggle:hover{border-color:var(--gold);background:var(--panel2)}

nav{max-width:1180px;margin:0 auto;padding:0 12px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-btn{
  background:none;border:none;color:var(--txt2);padding:13px 15px;font-size:13.5px;font-weight:700;
  border-bottom:2.5px solid transparent;transition:.15s;white-space:nowrap;letter-spacing:.01em;
}
.nav-btn:hover{color:var(--txt)}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ============ LAYOUT ============ */
main{max-width:1180px;margin:0 auto;padding:26px 20px}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec-title{display:flex;align-items:center;gap:12px;margin:6px 0 18px}
.sec-title h2{font-size:clamp(20px,3vw,27px)}
.sec-title .bar{width:5px;height:26px;background:var(--gold);border-radius:3px}
.muted{color:var(--txt2)}
.tiny{font-size:11.5px}

/* ============ HOME / HIGHLIGHT ============ */
.hero{
  background:linear-gradient(135deg,var(--panel) 0%,var(--bg2) 100%);
  border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;margin-bottom:22px;position:relative;overflow:hidden;
}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 85% 20%,rgba(245,197,24,.1),transparent 50%);pointer-events:none}
.hero-label{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(255,71,87,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,71,87,.6)}70%{box-shadow:0 0 0 9px rgba(255,71,87,0)}100%{box-shadow:0 0 0 0 rgba(255,71,87,0)}}
.next-match{display:flex;align-items:center;justify-content:center;gap:clamp(14px,5vw,52px);flex-wrap:wrap;text-align:center;position:relative}
.nm-team{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:120px}
.nm-flag{font-size:clamp(46px,9vw,72px);line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
.nm-name{font-family:'Anton',sans-serif;font-size:clamp(17px,2.6vw,24px);text-transform:uppercase;letter-spacing:.01em}
.nm-sub{font-size:11px;color:var(--txt2)}
.nm-center{display:flex;flex-direction:column;align-items:center;gap:6px}
.nm-vs{font-family:'Anton',sans-serif;font-size:30px;color:var(--gold)}
.nm-time{font-size:13px;font-weight:700}
.nm-venue{font-size:11.5px;color:var(--txt2);max-width:170px}
.countdown{display:flex;gap:8px;margin-top:8px;justify-content:center}
.cd-box{background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:7px 10px;min-width:52px}
.cd-box b{font-family:'Anton',sans-serif;font-size:22px;display:block;line-height:1;color:var(--gold)}
.cd-box span{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em}
.hero-foot{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}

.home-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
@media(max-width:820px){.home-grid{grid-template-columns:1fr}.next-match{gap:18px}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-h h3{font-size:15px;display:flex;align-items:center;gap:8px}
.card-h .ic{color:var(--gold)}
.link-more{font-size:12px;color:var(--gold);font-weight:600}

/* ============ MATCH ROWS ============ */
.match-row{
  display:grid;grid-template-columns:62px 1fr auto;gap:12px;align-items:center;
  padding:11px 12px;border-radius:var(--radius-sm);border:1px solid transparent;
  transition:.15s;cursor:pointer;
}
.match-row:hover{background:var(--panel2);border-color:var(--line2)}
.mr-time{text-align:center}
.mr-time b{font-size:14px;display:block;font-weight:800}
.mr-time span{font-size:10px;color:var(--txt2)}
.mr-teams{display:flex;flex-direction:column;gap:5px}
.mr-team{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600}
.mr-team .fl{font-size:18px;width:24px;text-align:center}
.mr-team.win{color:var(--gold)}
.mr-score{font-family:'Anton',sans-serif;font-size:15px;min-width:20px;text-align:center;margin-left:auto}
.mr-meta{text-align:right;font-size:10.5px;color:var(--txt3)}
.grp-badge{display:inline-block;background:var(--panel2);border:1px solid var(--line2);border-radius:5px;font-size:9.5px;font-weight:800;padding:2px 5px;color:var(--txt2);letter-spacing:.05em}
.played-tag{font-size:9px;color:var(--green);font-weight:700;letter-spacing:.05em}

/* ============ SCHEDULE FILTERS ============ */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.chip{background:var(--panel);border:1px solid var(--line2);color:var(--txt2);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;transition:.15s}
.chip:hover{color:var(--txt);border-color:var(--gold)}
.chip.active{background:var(--gold);color:#000;border-color:var(--gold)}
.day-group{margin-bottom:22px}
.day-head{font-family:'Archivo Narrow',sans-serif;font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);padding:8px 0;border-bottom:1px solid var(--line);margin-bottom:6px;display:flex;justify-content:space-between}
.day-head span{color:var(--txt3);font-weight:600}

/* ============ STANDINGS ============ */
.standings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.stand-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.stand-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.stand-head{background:var(--panel2);padding:10px 14px;font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.03em;display:flex;justify-content:space-between;align-items:center}
.stand-head .gl{color:var(--gold)}
table.stand{width:100%;min-width:290px;border-collapse:collapse;font-size:12.5px}
table.stand th{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;padding:7px 5px;text-align:center;border-bottom:1px solid var(--line)}
table.stand th:nth-child(2){text-align:left}
table.stand td{padding:8px 5px;text-align:center;border-bottom:1px solid var(--line)}
table.stand td:nth-child(2){text-align:left}
table.stand tr:last-child td{border-bottom:none}
.st-team{display:flex;align-items:center;gap:8px;font-weight:600}
.st-team .fl{font-size:16px}
.st-pos{width:20px;height:20px;border-radius:5px;display:inline-grid;place-items:center;font-size:11px;font-weight:800;background:var(--panel2)}
.st-pos.q{background:rgba(40,180,99,.18);color:var(--green)}
.st-pos.q3{background:rgba(58,160,255,.16);color:var(--blue)}
.st-pts{font-weight:800;color:var(--gold)}
.qual-legend{display:flex;gap:16px;font-size:11px;color:var(--txt2);margin-bottom:14px;flex-wrap:wrap}
.qual-legend i{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}

/* ============ TEAMS GRID ============ */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.team-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 14px;text-align:center;transition:.18s;cursor:pointer;position:relative;overflow:hidden;
}
.team-card::before{content:"";position:absolute;inset:0 0 auto 0;height:42%;background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);pointer-events:none}
.team-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--shadow)}
.team-card .tc-flag{font-size:46px;line-height:1;margin-bottom:10px;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35))}
.team-card .tc-name{font-weight:800;font-size:15px;margin-bottom:3px}
.team-card .tc-nick{font-size:10.5px;color:var(--txt2);margin-bottom:10px;min-height:13px}
.team-card .tc-tags{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.tc-tag{font-size:9px;font-weight:700;padding:2.5px 7px;border-radius:20px;background:var(--panel2);color:var(--txt2);letter-spacing:.03em}
.tc-tag.grp{background:rgba(245,197,24,.13);color:var(--gold)}
.tc-tag.fifa{background:rgba(58,160,255,.13);color:var(--blue)}
.tc-tag.off{background:rgba(40,180,99,.16);color:var(--green)}
.detail-dot{position:absolute;top:9px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--green)}

/* ============ MODAL ============ */
.modal-bg{position:fixed;inset:0;background:var(--modal-overlay);backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:18px;max-width:680px;width:100%;box-shadow:var(--shadow);animation:pop .3s ease}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
.modal-head{padding:22px 24px;border-bottom:1px solid var(--line);position:relative;background:linear-gradient(135deg,var(--panel),var(--bg2))}
.modal-head .mh-flag{font-size:52px;line-height:1}
.modal-head .mh-top{display:flex;align-items:center;gap:16px}
.modal-head h2{font-size:24px}
.modal-head .mh-sub{font-size:12.5px;color:var(--txt2);margin-top:3px}
/* ===== header đội nâng cấp ===== */
.team-head .mh-info{min-width:0}
.mh-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.mh-chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);letter-spacing:.02em}
.mh-chip.grp{background:rgba(245,197,24,.14);color:var(--gold);border-color:transparent}
.mh-chip.fifa{background:rgba(58,160,255,.14);color:var(--blue);border-color:transparent}
.mh-chip.off{background:rgba(40,180,99,.16);color:var(--green);border-color:transparent}
.mh-chip.host{background:rgba(226,54,54,.14);color:#ff7b7b;border-color:transparent}
.team-summary{background:linear-gradient(135deg,rgba(245,197,24,.08),transparent);border:1px solid var(--line);border-left:3px solid var(--gold);padding:13px 15px;border-radius:0 11px 11px 0;font-size:13.5px;line-height:1.65;margin-bottom:18px}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:16px}
.stat-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.stat-card .sc-k{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);font-weight:800;margin-bottom:4px}
.stat-card .sc-v{font-size:12.5px;font-weight:600;line-height:1.4}
.info-list{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px 14px;margin-bottom:4px}
.modal-close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:9px;background:var(--panel2);border:1px solid var(--line2);color:var(--txt);font-size:18px;display:grid;place-items:center;transition:.15s}
.modal-close:hover{background:var(--red);border-color:var(--red)}
.modal-body{padding:22px 24px}
.info-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.info-row .k{color:var(--txt2);min-width:90px;font-weight:600;flex-shrink:0}
.mb-block{margin-top:20px}
.mb-block h4{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--gold);margin-bottom:10px;font-weight:800}
/* ===== đội hình kiểu mới: nhóm vị trí + danh sách hàng ===== */
.squad-wrap{display:flex;flex-direction:column;gap:14px}
.pos-group{background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden}
.pos-head{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--panel2);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);border-bottom:1px solid var(--line)}
.pos-head .pos-ic{font-size:14px}
.pos-head .pos-count{margin-left:auto;background:var(--bg);border:1px solid var(--line2);color:var(--txt2);border-radius:20px;padding:1px 9px;font-size:10px;letter-spacing:0}
.player-rows{display:grid;grid-template-columns:1fr 1fr;gap:0}
.player-row{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:8px 13px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-width:0}
.player-row:nth-child(even){border-right:none}
.player-row .pl-name{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-row .pl-club{font-size:10.5px;color:var(--txt3);white-space:nowrap;flex-shrink:0;max-width:48%;overflow:hidden;text-overflow:ellipsis}
.squad-pos{margin-bottom:12px}
.squad-pos .pos-label{font-size:11px;font-weight:800;color:var(--txt2);margin-bottom:5px}
.squad-pos .players{display:flex;flex-wrap:wrap;gap:5px}
.player-pill{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 9px;font-size:11.5px}
.key-list li{font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line);list-style:none;padding-left:16px;position:relative}
.key-list li::before{content:"★";position:absolute;left:0;color:var(--gold);font-size:10px;top:8px}
.pred-box{background:var(--panel);border-left:3px solid var(--gold);padding:12px 14px;border-radius:0 9px 9px 0;font-size:13px;line-height:1.6}
.no-detail{text-align:center;padding:24px;color:var(--txt2);font-size:13px;background:var(--panel);border-radius:10px}

/* ============ H2H ============ */
.h2h-pick{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin-bottom:22px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
@media(max-width:640px){.h2h-pick{grid-template-columns:1fr;gap:10px}.h2h-pick .vs-mid{display:none}}
.h2h-select{background:var(--bg);border:1px solid var(--line2);color:var(--txt);padding:11px 13px;border-radius:9px;font-size:16px;font-weight:600;font-family:inherit;width:100%}
.vs-mid{font-family:'Anton',sans-serif;font-size:22px;color:var(--gold)}
.h2h-result{display:none}
.h2h-result.show{display:block;animation:fade .3s}
.h2h-banner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;background:linear-gradient(135deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:var(--radius);padding:22px;text-align:center;margin-bottom:18px}
.h2h-side .fl{font-size:56px;line-height:1;display:block;margin-bottom:8px}
.h2h-side .nm{font-family:'Anton',sans-serif;font-size:19px;text-transform:uppercase}
.h2h-side .meta{font-size:11px;color:var(--txt2)}
.h2h-mid{font-family:'Anton',sans-serif;font-size:26px;color:var(--gold)}
.h2h-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.h2h-cols{grid-template-columns:1fr}}

/* ============ SCORERS ============ */
.rank-list{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.rank-item{display:grid;grid-template-columns:38px 1fr auto;gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
.rank-item:last-child{border-bottom:none}
.rank-num{font-family:'Anton',sans-serif;font-size:20px;color:var(--txt3);text-align:center}
.rank-item:nth-child(1) .rank-num{color:var(--gold)}
.rank-info b{font-size:14px;font-weight:700;display:block}
.rank-info span{font-size:11.5px;color:var(--txt2)}
.rank-val{font-family:'Anton',sans-serif;font-size:24px;color:var(--gold)}
.empty-state{text-align:center;padding:50px 20px;color:var(--txt2)}
.empty-state .es-ic{font-size:44px;margin-bottom:12px}
.add-form{display:grid;grid-template-columns:2fr 1.5fr 70px auto;gap:8px;margin-bottom:18px;background:var(--panel);padding:14px;border-radius:var(--radius);border:1px solid var(--line)}
@media(max-width:640px){.add-form{grid-template-columns:1fr 1fr}.add-form #sfName{grid-column:1/-1}.add-form #sfAdd{grid-column:1/-1;justify-content:center;padding:11px}}
.add-form input,.add-form select{background:var(--bg);border:1px solid var(--line2);color:var(--txt);padding:9px 11px;border-radius:8px;font-size:16px;font-family:inherit;width:100%}

/* ============ NEWS ============ */
.news-list{display:flex;flex-direction:column;gap:12px}
.news-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;border-left:3px solid var(--gold);transition:.15s}
.news-item:hover{border-left-color:var(--red);background:var(--panel2)}
.news-meta{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.news-tag{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:rgba(245,197,24,.14);color:var(--gold)}
.news-date{font-size:11px;color:var(--txt3)}
.news-item h3{font-size:15.5px;margin-bottom:6px}
.news-item p{font-size:13px;color:var(--txt2);line-height:1.6}

/* score editor in modal */
.score-edit{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0 4px}
.score-edit input{width:54px;background:var(--bg);border:1px solid var(--line2);color:var(--txt);font-family:'Anton',sans-serif;font-size:22px;text-align:center;padding:6px;border-radius:9px}
.score-edit .sc-vs{color:var(--txt2);font-weight:700}
.match-modal-teams{display:flex;align-items:center;justify-content:space-around;gap:14px;margin:6px 0 18px}
.mmt-side{text-align:center}
.mmt-side .fl{font-size:46px;display:block;line-height:1;margin-bottom:6px}
.mmt-side .nm{font-weight:800;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#000;padding:12px 22px;border-radius:10px;font-weight:700;font-size:13px;z-index:300;transition:.35s;box-shadow:var(--shadow)}
.toast.show{transform:translateX(-50%) translateY(0)}
footer{max-width:1180px;margin:40px auto 0;padding:20px;text-align:center;color:var(--txt3);font-size:11.5px;border-top:1px solid var(--line)}
.kbd{background:var(--panel2);border:1px solid var(--line2);border-radius:5px;padding:1px 6px;font-size:11px;font-family:monospace}

/* ===== squad editor & badge ===== */
.mb-block h4{display:flex;align-items:center;gap:8px}
.squad-badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--panel2);color:var(--txt2);letter-spacing:.02em;text-transform:none}
.squad-badge.official{background:rgba(40,180,99,.18);color:var(--green)}
.squad-badge.edited{background:rgba(58,160,255,.16);color:var(--blue)}
.squad-textarea{width:100%;min-height:190px;background:var(--bg);border:1px solid var(--line2);color:var(--txt);border-radius:10px;padding:12px 14px;font-family:'Archivo',monospace;font-size:14px;line-height:1.7;resize:vertical}
.squad-textarea:focus{outline:none;border-color:var(--gold)}
.official-check{display:flex;align-items:center;gap:9px;margin-top:12px;font-size:13px;color:var(--txt2);cursor:pointer}
.official-check input{width:17px;height:17px;accent-color:var(--gold);cursor:pointer}
.squad-edit-btn{flex-shrink:0}

  .home-grid{gap:14px}

  .match-row{grid-template-columns:50px 1fr auto;gap:8px;padding:10px 8px}

// ---- dữ liệu gốc (mặc định = bản nhúng; sẽ bị ghi đè nếu fetch được file JSON trên server) ----

// ---- trạng thái (kết quả người dùng nhập, lưu localStorage-like qua window.storage nếu có) ----
let RESULTS = {};   // { matchId: {hs, as} }
let SCORERS = [];   // [{name, team, goals, assists}]
let SQUADS = {};    // { teamCode: {squad:{pos:[players]}, official:bool, updated:"YYYY-MM-DD"} }

/* ---------- Persistent storage ----------
   Ưu tiên window.storage (khi xem trong Claude), fallback localStorage (khi deploy web thật).
   Nếu cả hai đều không có -> chỉ lưu trong bộ nhớ phiên. */
const hasClaudeStorage = typeof window!=="undefined" && window.storage && typeof window.storage.get==="function";
const hasLocalStorage = (function(){
  try{ const k="__wc_test__"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return true; }
  catch(e){ return false; }
})();
async function storeGet(key){
  if(hasClaudeStorage){ try{ const r=await window.storage.get(key); return r&&r.value!=null?r.value:null; }catch(e){ return null; } }
  if(hasLocalStorage){ try{ return window.localStorage.getItem(key); }catch(e){ return null; } }
  return null;
}
async function storeSet(key,val){
  if(hasClaudeStorage){ try{ await window.storage.set(key,val); }catch(e){} }
  if(hasLocalStorage){ try{ window.localStorage.setItem(key,val); }catch(e){} }
}
async function loadState(){
  try{ const r=await storeGet(STORE_KEY);     if(r) RESULTS = JSON.parse(r); }catch(e){}
  try{ const s=await storeGet(STORE_SCORERS); if(s) SCORERS = JSON.parse(s); }catch(e){}
  try{ const q=await storeGet(STORE_SQUADS);  if(q) SQUADS  = JSON.parse(q); }catch(e){}
}
async function saveResults(){ await storeSet(STORE_KEY, JSON.stringify(RESULTS)); }
async function saveScorers(){ await storeSet(STORE_SCORERS, JSON.stringify(SCORERS)); }
async function saveSquads(){  await storeSet(STORE_SQUADS, JSON.stringify(SQUADS)); }

/* ---------- Helpers ---------- */
function T(code){ return TEAMS[code] || {code,name:code,flag:"🏳️",nick:"",group:"?"}; }
// đội hình hiển thị: ưu tiên bản người dùng cập nhật, fallback dữ liệu gốc
function getSquad(code){
  const ov=SQUADS[code];
  if(ov && ov.squad && Object.keys(ov.squad).length) return ov.squad;
  return (TEAMS[code]||{}).squad || {};
}
function squadMeta(code){
  const ov=SQUADS[code];
  if(ov) return { official: !!ov.official, updated: ov.updated, edited: !!ov.squad };
  // chưa có override -> đọc cờ official từ dữ liệu gốc (đội đã công bố danh sách chính thức)
  const t=TEAMS[code]||{};
  return { official: !!t.official, updated: t.officialDate, edited: false };
}
function squadToText(sq){
  // chuyển object đội hình -> text dạng "Vị trí: ct1, ct2" để sửa
  return Object.keys(sq).map(pos=>`${pos}: ${sq[pos].join(", ")}`).join("\n");
}
function textToSquad(txt){
  // parse ngược: mỗi dòng "Vị trí: a, b, c"
  const out={};
  txt.split(/\n+/).forEach(line=>{
    const i=line.indexOf(":"); if(i<1) return;
    const pos=line.slice(0,i).trim();
    const players=line.slice(i+1).split(/[,;]/).map(s=>s.trim()).filter(Boolean);
    if(pos && players.length) out[pos]=players;
  });
  return out;
}
// tách "Tên (CLB)" -> {name, club}
function splitPlayer(p){
  const m=String(p).match(/^(.*?)\s*\(([^)]*)\)\s*$/);
  if(m) return { name:m[1].trim(), club:m[2].trim() };
  return { name:String(p).trim(), club:"" };
}
// icon cho từng nhóm vị trí
function posIcon(pos){
  const p=pos.toLowerCase();
  if(p.includes("thủ môn")||p.includes("gk")) return "🧤";
  if(p.includes("hậu vệ")||p.includes("def")) return "🛡️";
  if(p.includes("tiền vệ")||p.includes("mid")) return "⚙️";
  if(p.includes("tiền đạo")||p.includes("fw")||p.includes("forward")) return "⚽";
  return "•";
}
function matchById(id){ return ALL_MATCHES.concat(KNOCKOUT).find(m=>m.id===id); }
function getScore(m){ // ưu tiên kết quả user nhập, fallback dữ liệu gốc
  if(RESULTS[m.id]) return RESULTS[m.id];
  if(m.hs!=null && m.as!=null) return {hs:m.hs, as:m.as};
  return null;
}
function isPlayed(m){ return getScore(m)!=null; }
function matchDateTime(m){
  // m.date = YYYY-MM-DD, m.timeVN = HH:MM (giờ VN). Tạo Date theo UTC+7.
  const [Y,Mo,D] = m.date.split("-").map(Number);
  const [h,mi] = (m.timeVN||"00:00").split(":").map(Number);
  return new Date(Date.UTC(Y,Mo-1,D,h-7,mi)); // quy về UTC
}
const VN_DAYS = ["Chủ Nhật","Thứ 2","Thứ 3","Thứ 4","Thứ 5","Thứ 6","Thứ 7"];
function fmtDate(m){
  const d = matchDateTime(m);
  // hiển thị theo giờ VN
  const vn = new Date(d.getTime()+7*3600*1000);
  return `${VN_DAYS[vn.getUTCDay()]}, ${vn.getUTCDate()}/${vn.getUTCMonth()+1}`;
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ============================================================
   STANDINGS — tính bảng xếp hạng từ kết quả
   ============================================================ */
function computeStandings(group){
  const teams = GROUPS.includes(group) ? Object.values(TEAMS).filter(t=>t.group===group) : [];
  const rows = {};
  teams.forEach(t=>{ rows[t.code]={code:t.code,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}; });
  ALL_MATCHES.filter(m=>m.group===group).forEach(m=>{
    const sc=getScore(m); if(!sc) return;
    const h=rows[m.home], a=rows[m.away]; if(!h||!a) return;
    h.P++;a.P++; h.GF+=sc.hs;h.GA+=sc.as; a.GF+=sc.as;a.GA+=sc.hs;
    if(sc.hs>sc.as){h.W++;a.L++;h.Pts+=3;}
    else if(sc.hs<sc.as){a.W++;h.L++;a.Pts+=3;}
    else{h.D++;a.D++;h.Pts++;a.Pts++;}
  });
  const arr=Object.values(rows);
  arr.forEach(r=>r.GD=r.GF-r.GA);
  arr.sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || T(x.code).name.localeCompare(T(y.code).name));
  return arr;
}

function startCountdown(m){
  clearInterval(countdownTimer);

  tick(); countdownTimer=setInterval(tick,1000);
}

function rowMatch(m){

    gf.innerHTML=`<button class="chip ${schedFilter.group==="all"?"active":""}" data-g="all">Tất cả bảng</button>`+
      GROUPS.map(g=>`<button class="chip ${schedFilter.group===g?"active":""}" data-g="${g}">Bảng ${g}</button>`).join("");
    gf.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{schedFilter.group=c.dataset.g;renderSchedule();});
  }
  // danh sách
  let list = schedFilter.round==="group" ? ALL_MATCHES.slice() :
    (schedFilter.round==="final" ? KNOCKOUT.filter(m=>["final","third"].includes(m.round)) : KNOCKOUT.filter(m=>m.round===schedFilter.round));
  if(schedFilter.round==="group" && schedFilter.group!=="all") list=list.filter(m=>m.group===schedFilter.group);
  // gom theo ngày
  const byDay={};
  list.forEach(m=>{ (byDay[m.date]=byDay[m.date]||[]).push(m); });
  const days=Object.keys(byDay).sort();
  document.getElementById("schedList").innerHTML = days.map(d=>{
    const ms=byDay[d].sort((a,b)=>(a.timeVN||"").localeCompare(b.timeVN||""));
    return `<div class="day-group"><div class="day-head">${fmtDate(ms[0])} <span>${ms.length} trận</span></div>${ms.map(rowMatch).join("")}</div>`;
  }).join("") || '<p class="muted">Chưa có lịch ở vòng này (phụ thuộc kết quả vòng trước).</p>';
  bindMatchRows(el);
}

function stdCard(g){
  const rows=computeStandings(g);
  return `<div class="stand-card">
    <div class="stand-head"><span>Bảng <span class="gl">${g}</span></span><span class="tiny muted">${rows.reduce((s,r)=>s+r.P,0)/2|0}/6 trận</span></div>

      <thead><tr><th>#</th><th>Đội</th><th>Tr</th><th>T</th><th>H</th><th>B</th><th>HS</th><th>Đ</th></tr></thead>
      <tbody>${rows.map((r,i)=>{
        const cls=i<2?"q":(i===2?"q3":"");
        const t=T(r.code);
        return `<tr><td><span class="st-pos ${cls}">${i+1}</span></td>
          <td><span class="st-team"><span class="fl">${t.flag}</span>${esc(t.name)}</span></td>
          <td>${r.P}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td>
          <td>${r.GD>0?"+":""}${r.GD}</td><td class="st-pts">${r.Pts}</td></tr>`;
      }).join("")}</tbody>
    </table></div></div>`;
}

function teamMatches(code){
  return ALL_MATCHES.concat(KNOCKOUT).filter(m=>m.home===code||m.away===code)
    .sort((a,b)=>matchDateTime(a)-matchDateTime(b));
}
function openTeamModal(code){
  const t=T(code);
  const ms=teamMatches(code);
  const off = t.official || (SQUADS[code]&&SQUADS[code].official);
  let html=`<div class="modal-head team-head">
    <button class="modal-close" onclick="WC.closeModal()">×</button>
    <div class="mh-top"><span class="mh-flag">${t.flag}</span>
    <div class="mh-info"><h2>${esc(t.name)}</h2>
    <div class="mh-sub">${esc(t.nick||"")}</div>
    <div class="mh-chips">
      <span class="mh-chip grp">Bảng ${t.group}</span>
      ${t.fifa?`<span class="mh-chip fifa">FIFA #${t.fifa}</span>`:""}
      <span class="mh-chip">${t.conf}</span>
      ${t.host?'<span class="mh-chip host">🏟️ Chủ nhà</span>':""}
      ${off?'<span class="mh-chip off">✓ Chính thức</span>':""}
    </div></div></div>
  </div><div class="modal-body">`;

  if(t.detail){
    if(t.summary) html+=`<div class="team-summary">${esc(t.summary)}</div>`;
    // stat cards: HLV / đội trưởng / sân
    const stats=[];
    if(t.coach) stats.push(["HLV", t.coach]);
    if(t.captain) stats.push(["Đội trưởng", t.captain]);
    if(t.stadium) stats.push(["Sân nhà", t.stadium]);
    if(stats.length){
      html+=`<div class="stat-cards">${stats.map(([k,v])=>`<div class="stat-card"><div class="sc-k">${k}</div><div class="sc-v">${esc(v)}</div></div>`).join("")}</div>`;
    }
    // info dạng hàng cho nội dung dài
    if(t.qualification||t.wcHistory){
      html+=`<div class="info-list">`;
      if(t.qualification) html+=infoRow("Vòng loại",t.qualification);
      if(t.wcHistory) html+=infoRow("Thành tích WC",t.wcHistory);
      html+=`</div>`;
    }
  } else {
    html+=`<div class="no-detail">Hồ sơ giới thiệu của đội này đang được bổ sung dần.<br>Bạn vẫn có thể nhập <b>danh sách chính thức</b> bên dưới khi đội công bố.</div>`;
  }

  // ----- Đội hình (dùng override nếu có) -----
  const sq=getSquad(code), meta=squadMeta(code);
  let badge="";
  if(meta.official) badge=`<span class="squad-badge official">✓ Chính thức${meta.updated?" · "+esc(meta.updated):""}</span>`;
  else if(meta.edited) badge=`<span class="squad-badge edited">✎ Đã cập nhật${meta.updated?" · "+esc(meta.updated):""}</span>`;
  else if(Object.keys(sq).length) badge=`<span class="squad-badge">Dự kiến</span>`;
  html+=`<div class="mb-block"><h4>Đội hình ${badge} </h4>`;
  if(Object.keys(sq).length){
    html+=`<div class="squad-wrap">`;
    for(const pos in sq){
      html+=`<div class="pos-group">
        <div class="pos-head"><span class="pos-ic">${posIcon(pos)}</span> ${esc(pos)} <span class="pos-count">${sq[pos].length}</span></div>
        <div class="player-rows">${sq[pos].map(p=>{
          const {name,club}=splitPlayer(p);
          return `<div class="player-row"><span class="pl-name">${esc(name)}</span>${club?`<span class="pl-club">${esc(club)}</span>`:""}</div>`;
        }).join("")}</div>
      </div>`;
    }
    html+=`</div>`;
  } else {
    html+=`<p class="muted tiny" style="padding:8px 0">Chưa có đội hình. Bấm "Cập nhật" để nhập danh sách khi đội công bố.</p>`;
  }
  html+=`</div>`;

  if(t.detail){
    if(t.keyPlayers&&t.keyPlayers.length){
      html+=`<div class="mb-block"><h4>Cầu thủ nổi bật</h4><ul class="key-list">${t.keyPlayers.map(p=>`<li>${esc(p)}</li>`).join("")}</ul></div>`;
    }
    if(t.prediction){
      html+=`<div class="mb-block"><h4>Dự đoán</h4><div class="pred-box">${esc(t.prediction)}</div></div>`;

/* ============================================================

function openSquadEditor(code){
  const t=T(code), sq=getSquad(code), meta=squadMeta(code);
  const text=Object.keys(sq).length?squadToText(sq):"Thủ môn: \nHậu vệ: \nTiền vệ: \nTiền đạo: ";
  const total=Object.values(sq).reduce((s,a)=>s+a.length,0);
  let html=`<div class="modal-head">
    <button class="modal-close" onclick="WC.closeModal()">×</button>
    <div class="mh-top"><span class="mh-flag">${t.flag}</span>
    <div><h2>Cập nhật đội hình</h2><div class="mh-sub">${esc(t.name)} · hiện có ${total} cầu thủ</div></div></div>
  </div><div class="modal-body">
    <p class="muted tiny" style="margin-bottom:10px">Mỗi dòng một vị trí, theo mẫu <span class="kbd">Vị trí: Cầu thủ A, Cầu thủ B</span>. Cách nhau bằng dấu phẩy. Khi đội công bố danh sách chính thức, tick ô bên dưới.</p>
    <textarea id="squadText" class="squad-textarea" spellcheck="false">${esc(text)}</textarea>
    <label class="official-check"><input type="checkbox" id="squadOfficial" ${meta.official?"checked":""}> Đây là <b>danh sách chính thức</b> đã công bố</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">
      <button class="btn btn-gold" id="saveSquad">💾 Lưu đội hình</button>
      ${meta.edited?'<button class="btn" id="resetSquad">↺ Khôi phục bản gốc</button>':""}
      <button class="btn" id="backTeam">← Quay lại</button>
    </div>
    <p class="muted tiny" style="margin-top:12px">Thay đổi được lưu tạm trên trình duyệt của bạn. Để cập nhật cho mọi người, sửa file dữ liệu trên kho lưu trữ.</p>
  </div>`;
  showModal(html);
  document.getElementById("saveSquad").onclick=async()=>{
    const parsed=textToSquad(document.getElementById("squadText").value);
    if(!Object.keys(parsed).length){ toast("⚠️ Chưa có dữ liệu hợp lệ"); return; }
    SQUADS[code]={ squad:parsed, official:document.getElementById("squadOfficial").checked, updated:todayStr() };
    await saveSquads(); toast("✅ Đã lưu đội hình"); openTeamModal(code);
  };
  const rb=document.getElementById("resetSquad");
  if(rb) rb.onclick=async()=>{ delete SQUADS[code]; await saveSquads(); toast("↺ Đã khôi phục bản gốc"); openTeamModal(code); };
  document.getElementById("backTeam").onclick=()=>openTeamModal(code);
}
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function infoRow(k,v){ return `<div class="info-row"><span class="k">${esc(k)}</span><span>${esc(v)}</span></div>`; }

   ============================================================ */
function openMatchModal(id){
  const m=matchById(id); if(!m) return;
  const h=T(m.home),a=T(m.away),sc=getScore(m);
  const known = m.home && m.away;
  let html=`<div class="modal-head">
    <button class="modal-close" onclick="WC.closeModal()">×</button>
    <div class="mh-sub" style="margin-bottom:6px">${ROUND_LABEL[m.round]||""}${m.group?` · Bảng ${m.group}`:""} · ${fmtDate(m)} · ${m.timeVN} (giờ VN)</div>
    <div class="mh-sub">${esc(m.venue||"")}${m.note?` · ${esc(m.note)}`:""}</div>
  </div><div class="modal-body">`;
  if(known){
    const scoreHtml = currentView === "home" ? `
      <div class="score-edit">
        <input type="number" min="0" max="99" id="scoreH" value="${sc?sc.hs:""}" placeholder="-">
        <span class="sc-vs">:</span>
        <input type="number" min="0" max="99" id="scoreA" value="${sc?sc.as:""}" placeholder="-">
      </div>` : `<div class="score-edit"><span style="font-family:'Anton',sans-serif;font-size:22px">${sc?`${sc.hs} : ${sc.as}`:"- : -"}</span></div>`;
    html+=`<div class="match-modal-teams">
      <div class="mmt-side"><span class="fl">${h.flag}</span><div class="nm">${esc(h.name)}</div></div>
      ${scoreHtml}
      <div class="mmt-side"><span class="fl">${a.flag}</span><div class="nm">${esc(a.name)}</div></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${currentView === "home" ? `<button class="btn btn-gold" id="saveScore">💾 Lưu kết quả</button>${sc?'<button class="btn" id="clearScore">🗑 Xóa kết quả</button>':""}` : ""}
      <button class="btn" data-h2h="${m.home}|${m.away}">⚔️ So sánh đội hình</button>
    </div>
    ${currentView === "home" ? `<p class="muted tiny" style="text-align:center;margin-top:12px">Lưu xong, Bảng xếp hạng sẽ tự cập nhật (chỉ trên trình duyệt của bạn).</p>` : ""}`;
  } else {
    html+=`<div class="no-detail">Cặp đấu vòng knockout này phụ thuộc kết quả vòng trước.<br>${esc(m.homeRef||"")} vs ${esc(m.awayRef||"")}</div>`;
  }
  html+=`</div>`;
  showModal(html);
  if(known){
    if(currentView === "home"){
      document.getElementById("saveScore").onclick=async()=>{
        const hs=parseInt(document.getElementById("scoreH").value,10);
        const as=parseInt(document.getElementById("scoreA").value,10);
        if(isNaN(hs)||isNaN(as)||hs<0||as<0){ toast("⚠️ Nhập tỉ số hợp lệ"); return; }
        RESULTS[m.id]={hs,as}; await saveResults(); closeModal(); toast("✅ Đã lưu kết quả");
        refreshAll();
      };
      const cs=document.getElementById("clearScore");
      if(cs) cs.onclick=async()=>{ delete RESULTS[m.id]; await saveResults(); closeModal(); toast("🗑 Đã xóa"); refreshAll(); };
    }
    const h2hBtn=document.querySelector("[data-h2h]");
    if(h2hBtn) h2hBtn.onclick=()=>{ closeModal(); const[x,y]=h2hBtn.dataset.h2h.split("|"); switchView("h2h"); setTimeout(()=>doH2H(x,y),50); };
  }
}

function doH2H(ca,cb){
  document.getElementById("h2hA").value=ca; document.getElementById("h2hB").value=cb;
  const a=T(ca),b=T(cb);
  const box=document.getElementById("h2hResult"); box.classList.add("show");
  // có cùng bảng không + có trận chung không
  const common = ALL_MATCHES.concat(KNOCKOUT).filter(m=>(m.home===ca&&m.away===cb)||(m.home===cb&&m.away===ca));
  let banner=`<div class="h2h-banner">
    <div class="h2h-side"><span class="fl">${a.flag}</span><div class="nm">${esc(a.name)}</div><div class="meta">Bảng ${a.group} · ${a.conf}${a.fifa?` · #${a.fifa}`:""}</div></div>
    <div class="h2h-mid">VS</div>
    <div class="h2h-side"><span class="fl">${b.flag}</span><div class="nm">${esc(b.name)}</div><div class="meta">Bảng ${b.group} · ${b.conf}${b.fifa?` · #${b.fifa}`:""}</div></div>
  </div>`;
  if(common.length){
    banner+=`<div class="card" style="margin-bottom:16px"><div class="card-h"><h3>📅 Chạm trán tại WC 2026</h3></div>${common.map(rowMatch).join("")}</div>`;
  } else {
    banner+=`<p class="muted tiny" style="text-align:center;margin-bottom:16px">Hai đội không cùng bảng — chỉ có thể gặp nhau ở vòng knockout.</p>`;
  }
  // hai cột thông tin / đội hình
  banner+=`<div class="h2h-cols">${[a,b].map(t=>{
    let c=`<div class="card"><div class="card-h"><h3>${t.flag} ${esc(t.name)}</h3></div>`;
    if(t.detail){
      if(t.coach)c+=`<div class="info-row"><span class="k">HLV</span><span>${esc(t.coach)}</span></div>`;
      if(t.captain)c+=`<div class="info-row"><span class="k">Đội trưởng</span><span>${esc(t.captain)}</span></div>`;
      if(t.keyPlayers)c+=`<div class="mb-block"><h4>Cầu thủ nổi bật</h4><ul class="key-list">${t.keyPlayers.slice(0,4).map(p=>`<li>${esc(p)}</li>`).join("")}</ul></div>`;
    } else { c+=`<p class="muted tiny" style="padding:10px 0">Hồ sơ giới thiệu đang bổ sung.</p>`; }
    const sq=getSquad(t.code), meta=squadMeta(t.code);
    if(Object.keys(sq).length){
      const tag=meta.official?' <span class="squad-badge official">✓ Chính thức</span>':(meta.edited?' <span class="squad-badge edited">✎</span>':"");
      c+=`<div class="mb-block"><h4>Đội hình${tag}</h4><div class="squad-wrap">`;
      for(const pos in sq){
        c+=`<div class="pos-group"><div class="pos-head"><span class="pos-ic">${posIcon(pos)}</span> ${esc(pos)} <span class="pos-count">${sq[pos].length}</span></div><div class="player-rows">${sq[pos].map(p=>{const {name,club}=splitPlayer(p);return `<div class="player-row"><span class="pl-name">${esc(name)}</span>${club?`<span class="pl-club">${esc(club)}</span>`:""}</div>`;}).join("")}</div></div>`;
      }
      c+=`</div></div>`;
    }
    c+=`<button class="btn" style="margin-top:10px;width:100%;justify-content:center" onclick="WC.openTeam('${t.code}')">Xem hồ sơ đầy đủ →</button></div>`;
    return c;
  }).join("")}</div>`;
  box.innerHTML=banner;
}

      <select id="sfTeam">${Object.values(TEAMS).sort((a,b)=>a.name.localeCompare(b.name)).map(t=>`<option value="${t.code}">${t.flag} ${esc(t.name)}</option>`).join("")}</select>
      <input id="sfVal" type="number" min="0" value="1" title="Số bàn/kiến tạo">
      <button class="btn btn-gold" id="sfAdd">+ Thêm</button>
    </div>
    <div id="rankList"></div>`;
  el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{scorerTab=c.dataset.t;renderScorers();});
  document.getElementById("sfAdd").onclick=addScorer;
  drawRank();
}
function drawRank(){
  const key=scorerTab==="goals"?"goals":"assists";
  const list=SCORERS.filter(s=>(s[key]||0)>0).sort((a,b)=>b[key]-a[key]);
  const box=document.getElementById("rankList");
  if(!list.length){ box.innerHTML=`<div class="empty-state"><div class="es-ic">${scorerTab==="goals"?"⚽":"🅰️"}</div>Chưa có dữ liệu. Thêm cầu thủ ở trên — dữ liệu lưu trong trình duyệt và xuất được ra JSON.</div>`; return; }
  box.innerHTML=`<div class="rank-list">${list.map((s,i)=>{
    const t=T(s.team);
    return `<div class="rank-item"><div class="rank-num">${i+1}</div>
      <div class="rank-info"><b>${esc(s.name)}</b><span>${t.flag} ${esc(t.name)}</span></div>
      <div style="display:flex;align-items:center;gap:14px"><span class="rank-val">${s[key]}</span>
      <button class="btn" style="padding:5px 9px" onclick="WC.delScorer(${SCORERS.indexOf(s)})">✕</button></div></div>`;
  }).join("")}</div>`;
}
async function addScorer(){
  const name=document.getElementById("sfName").value.trim();
  const team=document.getElementById("sfTeam").value;
  const val=parseInt(document.getElementById("sfVal").value,10)||0;
  if(!name){ toast("⚠️ Nhập tên cầu thủ"); return; }
  const key=scorerTab==="goals"?"goals":"assists";
  let ex=SCORERS.find(s=>s.name.toLowerCase()===name.toLowerCase()&&s.team===team);
  if(ex){ ex[key]=val; } else { const o={name,team,goals:0,assists:0}; o[key]=val; SCORERS.push(o); }
  await saveScorers(); document.getElementById("sfName").value=""; drawRank(); toast("✅ Đã cập nhật");
}

/* ============================================================
   RENDER: NEWS
   ============================================================ */
function renderNews(){
  const el=document.getElementById("view-news");
  const news=(NEWS.news||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML=`
    <div class="sec-title"><span class="bar"></span><h2>Tin tức giải đấu</h2></div>
    <div class="news-list">${news.map(n=>`
      <div class="news-item">
        <div class="news-meta"><span class="news-tag">${esc(n.tag)}</span><span class="news-date">${esc(n.date)}</span></div>
        <h3>${esc(n.title)}</h3><p>${esc(n.body)}</p>
      </div>`).join("")}</div>`;
}

/* ============================================================
   MODAL helpers
   ============================================================ */
function showModal(html){ document.getElementById("modalContent").innerHTML=html; document.getElementById("modalBg").classList.add("open"); }
function closeModal(){ document.getElementById("modalBg").classList.remove("open"); }
document.getElementById("modalBg").onclick=e=>{ if(e.target.id==="modalBg") closeModal(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* ============================================================
   IMPORT / EXPORT JSON
   ============================================================ */
function exportJSON(){
  const out={
    _meta:{tournament:"FIFA World Cup 2026",exported:new Date().toISOString(),note:"File cập nhật — gồm kết quả, vua phá lưới, đội hình. Nhập lại bằng nút Nhập."},
    results:RESULTS, scorers:SCORERS, squads:SQUADS
  };
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="wc2026-ket-qua.json"; a.click();
  URL.revokeObjectURL(url); toast("⬇ Đã xuất file kết quả");
}
function importJSON(file){
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const d=JSON.parse(r.result);
      if(d.results) RESULTS=d.results;
      if(d.scorers) SCORERS=d.scorers;
      if(d.squads) SQUADS=d.squads;
      await saveResults(); await saveScorers(); await saveSquads();
      refreshAll(); toast("⬆ Đã nhập dữ liệu");
    }catch(e){ toast("⚠️ File không hợp lệ"); }
  };
  r.readAsText(file);
}

/* ============================================================
   GLOBAL refresh
   ============================================================ */
const RENDERERS={home:renderHome,schedule:renderSchedule,standings:renderStandings,teams:renderTeams,h2h:renderH2H,scorers:renderScorers,news:renderNews};
function refreshAll(){
  const active=document.querySelector(".view.active");
  if(active){ const id=active.id.replace("view-",""); RENDERERS[id]&&RENDERERS[id](); }
}

// API công khai cho onclick inline
window.WC={ closeModal, openTeam:openTeamModal, delScorer:async(i)=>{ SCORERS.splice(i,1); await saveScorers(); drawRank(); } };

/* ============================================================
   FETCH DỮ LIỆU TỪ SERVER (cách B)
   - Khi deploy: app đọc data/*.json cùng thư mục → mọi người xem chung.
   - Nếu fetch lỗi (mở file offline, hoặc xem trong Claude): dùng bản nhúng.
   - data/results.json (tùy chọn) chứa kết quả + đội hình cập nhật → ưu tiên hiển thị chung.
   ============================================================ */
let SERVER_RESULTS = null; // kết quả lấy từ server (chung cho mọi người)
async function fetchData(){
  // chỉ fetch khi chạy qua http(s); mở file:// trực tiếp sẽ bị chặn → bỏ qua, dùng bản nhúng
  if(typeof location==="undefined" || !/^https?:$/.test(location.protocol)) return;
  async function tryJSON(path){
    try{ const r=await fetch(path,{cache:"no-store"}); if(!r.ok) return null; return await r.json(); }
    catch(e){ return null; }
  }
  const [teams,matches,news,results] = await Promise.all([
    tryJSON("data/teams.json"),
    tryJSON("data/matches.json"),
    tryJSON("data/news.json"),
    tryJSON("data/results.json")
  ]);
  if(teams && teams.teams) TEAMS = teams.teams;
  if(matches && matches.matches){ ALL_MATCHES = matches.matches.slice(); KNOCKOUT = (matches.knockout||[]).slice(); }
  if(news && news.news) NEWS = news;
  // results.json: kết quả + đội hình do bạn cập nhật, áp cho mọi người
  if(results){
    SERVER_RESULTS = results;
    if(results.results) RESULTS = Object.assign({}, results.results);
    if(results.scorers) SCORERS = results.scorers.slice();
    if(results.squads)  SQUADS  = Object.assign({}, results.squads);
  }
}

/* ============================================================
   THEME (Sáng/Tối)
   ============================================================ */
const THEME_KEY="wc2026_theme";
function applyTheme(t){
  if(t==="light") document.documentElement.setAttribute("data-theme","light");
  else document.documentElement.removeAttribute("data-theme");
  const btn=document.getElementById("btnTheme");
  if(btn) btn.textContent = (t==="light") ? "☀️" : "🌙";
}
function getSavedTheme(){
  try{ return localStorage.getItem(THEME_KEY); }catch(e){ return null; }
}
function saveTheme(t){ try{ localStorage.setItem(THEME_KEY,t); }catch(e){} }
function initTheme(){
  // ưu tiên lựa chọn đã lưu của người dùng; nếu chưa có thì MẶC ĐỊNH giao diện SÁNG
  let t=getSavedTheme();
  if(!t) t="light";
  applyTheme(t);
  const btn=document.getElementById("btnTheme");
  if(btn) btn.onclick=()=>{
    const cur=document.documentElement.getAttribute("data-theme")==="light"?"light":"dark";
    const next=cur==="light"?"dark":"light";
    applyTheme(next); saveTheme(next);
  };
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  initTheme();         // 0) áp theme trước để tránh nhấp nháy
  await fetchData();   // 1) lấy dữ liệu chung từ server (nếu deploy)
  // 2) Nếu server CÓ results.json → đó là bản chung chính thức, không để localStorage cá nhân ghi đè.
  //    Nếu KHÔNG có → quay về chế độ cá nhân (mỗi người tự nhập, lưu localStorage).
  if(!SERVER_RESULTS) await loadState();
  renderNav();
  document.querySelector('.nav-btn[data-view="home"]').classList.add("active");
  renderHome();
  document.getElementById("btnExport").onclick=exportJSON;
  document.getElementById("btnImport").onclick=()=>document.getElementById("fileInput").click();
  document.getElementById("fileInput").onchange=e=>{ if(e.target.files[0]) importJSON(e.target.files[0]); e.target.value=""; };
}
init();
})();

</script>
